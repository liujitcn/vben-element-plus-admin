<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="renderer" content="webkit" />
    <meta name="description" content="A Modern Back-end Management System" />
    <meta name="keywords" content="Vben Admin Vue3 Vite" />
    <meta name="author" content="Vben" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=0"
    />
    <title>%VITE_APP_TITLE%</title>
    <link rel="icon" href="/favicon.ico" />
    <script>
      // 生产环境下注入百度统计
      if (window._VBEN_ADMIN_PRO_APP_CONF_) {
        var _hmt = _hmt || [];
        (function () {
          var hm = document.createElement('script');
          hm.src =
            'https://hm.baidu.com/hm.js?97352b16ed2df8c3860cf5a1a65fb4dd';
          var s = document.getElementsByTagName('script')[0];
          s.parentNode.insertBefore(hm, s);
        })();
      }
    </script>
  </head>
  <body>
    <script data-app-loading="inject-js">
      (function () {
        var prefix = '%VITE_APP_NAMESPACE%-%VITE_APP_VERSION%-';
        var cacheName = Object.keys(localStorage).find(function (key) {
          return key.indexOf(prefix) === 0 && key.endsWith('-preferences-theme');
        });
        var theme = localStorage.getItem(cacheName);
        document.documentElement.classList.toggle('dark', /dark/.test(theme));
      })();
    </script>
    <style data-app-loading="inject-css">
      html {
        line-height: 1.15;
      }

      .loading {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #f4f7f9;
      }

      .loading.hidden {
        pointer-events: none;
        visibility: hidden;
        opacity: 0;
        transition: all 0.8s ease-out;
      }

      .dark .loading {
        background: #0d0d10;
      }

      .title {
        margin-top: 66px;
        font-size: 28px;
        font-weight: 600;
        color: rgb(0 0 0 / 85%);
      }

      .dark .title {
        color: #fff;
      }

      .loader {
        position: relative;
        width: 48px;
        height: 48px;
      }

      .loader::before {
        position: absolute;
        top: 60px;
        left: 0;
        width: 48px;
        height: 5px;
        content: '';
        background: hsl(var(--primary, 210 100% 50%) / 50%);
        border-radius: 50%;
        animation: shadow-ani 0.5s linear infinite;
      }

      .loader::after {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        content: '';
        background: hsl(var(--primary, 210 100% 50%));
        border-radius: 4px;
        animation: jump-ani 0.5s linear infinite;
      }

      @keyframes jump-ani {
        15% {
          border-bottom-right-radius: 3px;
        }

        25% {
          transform: translateY(9px) rotate(22.5deg);
        }

        50% {
          border-bottom-right-radius: 40px;
          transform: translateY(18px) scale(1, 0.9) rotate(45deg);
        }

        75% {
          transform: translateY(9px) rotate(67.5deg);
        }

        100% {
          transform: translateY(0) rotate(90deg);
        }
      }

      @keyframes shadow-ani {
        0%,
        100% {
          transform: scale(1, 1);
        }

        50% {
          transform: scale(1.2, 1);
        }
      }
    </style>
    <div class="loading" id="__app-loading__">
      <div class="loader"></div>
      <div class="title">%VITE_APP_TITLE%</div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
